name: PCH Watch — Scraper

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC (= 01h, 07h, 13h, 19h Algiers time)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scraper.js

      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --staged --quiet || git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
